name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Grant script execution access
      run: chmod +x ./run.sh
    - name: Build init (dependencies and libraries)
      run: ./run.sh init

    - name: Build app + tests 
      run: ./run.sh tests

    - name: Generate doc
      run: ./run.sh doc

