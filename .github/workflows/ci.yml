name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t cilaos .

    - name: Build app + tests 
      run: docker run --rm cilaos ./run.sh test

    - name: Build app for Sonar
      run: docker run --rm -v "${{ github.workspace }}:/usr/src" cilaos ./run.sh build-sonar

    - name: SonarCloud code scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        docker run --rm -e SONAR_TOKEN=$SONAR_TOKEN \
          -v "${{ github.workspace }}:/usr/src" \
          sonarsource/sonar-scanner-cli \
          -Dsonar.login=$SONAR_TOKEN
          
    - name: Generate doc
      run: docker run --rm cilaos ./run.sh doc