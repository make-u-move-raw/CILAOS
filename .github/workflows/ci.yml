name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake xorg-dev libgl1-mesa-dev libglu1-mesa-dev
        sudo apt-get install -y libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

    - name: Grant script execution access
      run: chmod +x ./run.sh

    - name: Build init (dependencies and libraries)
      run: ./run.sh init

    - name: Build app + tests 
      run: ./run.sh tests

    - name: Generate doc
      run: ./run.sh doc

